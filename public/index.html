<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniCodex Gateway</title>
<style>
:root{--bg:#07090e;--card:#0d1117;--card2:#111820;--border:#1a2332;--text:#e2e8f0;--muted:#64748b;--acc:#818cf8;--acc2:#6366f1;--green:#10b981;--green2:#059669;--red:#ef4444;--red2:#b91c1c;--amber:#f59e0b;--radius:8px;--xxs:.65rem;--xs:.72rem;--sm:.8rem;--md:.9rem}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:var(--xs)}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.sidebar .logo{font-size:var(--sm);font-weight:700;padding:8px 16px 16px;color:var(--acc);display:flex;align-items:center;gap:8px;letter-spacing:-.01em}
.sidebar .logo svg{width:22px;height:22px}
.nav-item{padding:9px 16px;cursor:pointer;color:var(--muted);font-size:var(--xs);display:flex;align-items:center;gap:8px;border:none;background:none;width:100%;text-align:left;transition:.12s}
.nav-item:hover{color:var(--text);background:var(--card2)}
.nav-item svg{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item.active{color:var(--text);background:var(--card2);border-left:2px solid var(--acc);padding-left:14px}
.nav-item.active svg{opacity:1;color:var(--acc)}
.main{flex:1;padding:24px 28px;overflow-y:auto;max-height:100vh}
h2{font-size:1.05rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}
h3{font-size:var(--sm);font-weight:600}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:.12s}
.card:hover{border-color:#2d3a4a}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-header h3{font-size:var(--xs);display:flex;align-items:center;gap:6px}
.status{display:inline-flex;align-items:center;gap:5px;font-size:.65rem;padding:2px 8px;border-radius:20px;font-weight:500}
.status.online{background:#064e3b;color:var(--green)}
.status.offline{background:#450a0a;color:var(--red)}
.status-dot{width:6px;height:6px;border-radius:50%}
.status.online .status-dot{background:var(--green)}
.status.offline .status-dot{background:var(--red)}
input[type="text"],input[type="password"],input[type="search"],textarea{width:100%;padding:8px 10px;background:#0a0e14;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:var(--xxs);font-family:inherit;outline:none}
input:focus,textarea:focus{border-color:var(--acc)}
textarea{resize:vertical;font-family:"JetBrains Mono",monospace;font-size:.65rem;line-height:1.5;min-height:80px}
label.label{display:block;font-size:.62rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.input-row{display:flex;gap:8px;align-items:end}
.input-row>div{flex:1}
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:var(--xxs);font-weight:500;transition:.12s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn svg{width:14px;height:14px}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc2)}
.btn-green{background:var(--green2);color:#fff}
.btn-green:hover{background:var(--green)}
.btn-danger{background:var(--red2);color:#fff}
.btn-danger:hover{background:var(--red)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn-sm{padding:4px 8px;font-size:.6rem}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.status-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;min-width:160px;flex:1}
.stat-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.stat-value{font-size:1.2rem;font-weight:700;margin-top:2px}
.stat-sub{font-size:.62rem;color:var(--muted);margin-top:2px}
.search-bar{position:relative;margin-bottom:16px}
.search-bar input{padding-left:36px}
.search-bar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.model-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.model-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.model-name{font-family:"JetBrains Mono",monospace;font-size:.65rem;font-weight:500;word-break:break-all}
.model-provider{font-size:.58rem;color:var(--muted)}
.model-actions{display:flex;gap:6px;margin-top:6px}
.model-list-compact{max-height:280px;overflow-y:auto}
.model-list-compact label{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:var(--xxs);cursor:pointer;border-radius:4px;transition:.08s}
.model-list-compact label:hover{background:var(--card2)}
.model-list-compact input[type="checkbox"]{accent-color:var(--acc);width:14px;height:14px;flex-shrink:0}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.58rem;padding:2px 8px;border-radius:12px;background:var(--card2);border:1px solid var(--border);color:var(--muted)}
.badge.active{background:#1a2740;border-color:var(--acc);color:var(--acc)}
.chat-log{background:#05080c;border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:150px;max-height:400px;overflow-y:auto;font-family:"JetBrains Mono",monospace;font-size:.6rem;line-height:1.6;margin-bottom:10px;white-space:pre-wrap}
.chat-msg{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #0a0e14}
.chat-msg.user{color:var(--acc)}
.chat-msg.assistant{color:var(--green)}
.chat-msg.system{color:var(--amber)}
.chat-msg.error{color:var(--red)}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);font-size:var(--xxs);z-index:100;animation:su .25s ease;max-width:360px}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
.text-muted{font-size:.6rem;color:var(--muted)}.mono{font-family:"JetBrains Mono",monospace}
.ma-0{margin:0}.mt-2{margin-top:4px}.mt-3{margin-top:8px}.mt-4{margin-top:12px}.mb-2{margin-bottom:4px}.mb-3{margin-bottom:8px}.mb-4{margin-bottom:12px}
.flex-between{display:flex;justify-content:space-between;align-items:center}

</style>
</head>
<body>
<aside class="sidebar"><div class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/><path d="M12 3v2"/><path d="M12 19v2"/><path d="M3 12h2"/><path d="M19 12h2"/></svg> OmniCodex</div>
<button class="nav-item active" data-page="dashboard"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Dashboard</button>
<button class="nav-item" data-page="providers"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Providers</button>
<button class="nav-item" data-page="models"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="8" y1="8" x2="8" y2="8.01"/><line x1="8" y1="12" x2="8" y2="12.01"/><line x1="8" y1="16" x2="8" y2="16.01"/></svg> Models</button>
<button class="nav-item" data-page="playground"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Playground</button>
<button class="nav-item" data-page="profile"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Profile</button>
<button class="nav-item" data-page="logs"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Logs</button>
</aside>
<main class="main" id="main"></main>
<div id="toast" class="toast hidden"></div>
<script>

const API = "";

// SVG icons (Feather-inspired, minimal)
const I = {
  dashboard: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
  providers: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
  models: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="8" y1="8" x2="8" y2="8.01"/><line x1="8" y1="12" x2="8" y2="12.01"/><line x1="8" y1="16" x2="8" y2="16.01"/></svg>',
  profile: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  logs: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
  playground: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
  search: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  refresh: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>',
  plus: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  trash: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  download: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  send: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
  check: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  test: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
  box: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
  lock: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
  globe: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
  database: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>',
  omni: '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/><path d="M12 3v2"/><path d="M12 19v2"/><path d="M3 12h2"/><path d="M19 12h2"/></svg>'
};

let currentPage = "dashboard";
let allModels = [], allSelections = {};

document.querySelectorAll(".nav-item").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentPage = btn.dataset.page;
    renderPage();
  });
});

function toast(msg, type) {
  type = type || "success";
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast " + type;
  el.classList.remove("hidden");
  setTimeout(function() { el.classList.add("hidden"); }, 3000);
}

async function api(method, path, body) {
  var opts = { method: method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(API + path, opts);
  return res.json();
}

async function restartGateway() {
  var el = document.getElementById("restart-status");
  el.innerHTML = "Restarting...";
  try {
    var r = await api("POST", "/api/restart");
    if (r.ok) {
      el.innerHTML = "<span style=\"color:var(--green)\">Restarted! Reconnecting in 3s...</span>";
      setTimeout(function() { location.reload(); }, 3000);
    } else {
      el.innerHTML = "<span style=\"color:var(--red)\">Failed: " + (r.error || "unknown") + "</span>";
    }
  } catch(e) {
    el.innerHTML = "<span style=\"color:var(--red)\">Error: " + e.message + "</span>";
  }
}

async function renderPage() {
  var main = document.getElementById("main");
  try {
    switch (currentPage) {
      case "dashboard": main.innerHTML = await renderDashboard(); break;
      case "providers": main.innerHTML = await renderProviders(); break;
      case "models": main.innerHTML = await renderModels(); initModelPage(); break;
      case "playground": main.innerHTML = await renderPlayground(); break;
      case "profile": main.innerHTML = await renderProfile(); break;
      case "logs": main.innerHTML = renderLogs(); break;
    }
  } catch (e) { main.innerHTML = '<h2>Error</h2><p>' + e.message + '</p>'; }
}

async function renderDashboard() {
  var s = await api("GET", "/api/status");
  var p = s.profile || {};
  var pn = p.profile || "unknown";
  var ms = p.model || "unknown";
  var pv = p.provider || "unknown";
  var dm = ms.indexOf("/") !== -1 ? '<span class="text-muted">' + ms.split("/")[0] + '/</span><strong>' + ms.split("/").slice(1).join("/") + '</strong>' : ms;
  var models = await api("GET", "/api/models");
  var catalog = models.catalog || [];
  var providers = await api("GET", "/api/providers");
  var cfg = providers.filter(function(x){return x.hasKey}).length;
  var tot = catalog.length;
  var pp = {};
  for (var i = 0; i < catalog.length; i++) {
    var pid = (catalog[i].slug || "").split("/")[0];
    pp[pid] = (pp[pid] || 0) + 1;
  }
  var pk = Object.keys(pp).sort();
  var bd = pk.map(function(x){return '<span class="badge">' + x + ' <strong>' + pp[x] + '</strong></span>'}).join(" ");
  var ot = pn === "default" ? "omnicodex" : "default";
  var ol = pn === "default" ? "OmniCodex" : "Default";

  return '<h2>' + I.dashboard + ' Dashboard</h2>' +
    '<div class="status-row">' +
    '<div class="stat-card"><div class="stat-label">Active Profile</div><div class="stat-value">' + pn + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Active Model</div><div class="stat-value" style="font-size:.75rem">' + dm + '</div><div class="stat-sub">via ' + pv + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Gateway</div><div class="stat-value">:' + s.gatewayPort + ' / :' + s.adminPort + '</div><div class="stat-sub">API / Admin</div></div>' +
    '<div class="stat-card"><div class="stat-label">API Keys</div><div class="stat-value">' + cfg + ' / ' + providers.length + '</div><div class="stat-sub">' + (providers.filter(function(x){return x.hasKey}).map(function(x){return x.id}).join(", ") || "none") + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Catalog</div><div class="stat-value">' + tot + ' models</div><div class="stat-sub">' + pk.length + ' providers</div></div>' +
    '<div class="stat-card"><div class="stat-label">Uptime</div><div class="stat-value">' + formatUptime(s.uptime) + '</div></div>' +
    '</div>' +
    '<div class="card mt-3"><div class="card-header"><h3>' + I.box + ' Models by Provider</h3></div>' +
    '<div class="btn-row" style="margin-top:4px">' + bd + '</div></div>' +
    '<h2 class="mt-4">' + I.check + ' Quick Actions</h2>' +
    '<div class="cards">' +
    '<div class="card"><div class="card-header"><h3>' + I.refresh + ' Refresh</h3></div><p class="text-muted mb-3">Fetch models and rebuild catalog</p><button class="btn btn-primary" onclick="refreshModels()">' + I.refresh + ' Refresh All</button></div>' +
    '<div class="card"><div class="card-header"><h3>' + I.profile + ' Switch Profile</h3></div><p class="text-muted mb-3">Current: <strong>' + pn + '</strong></p><button class="btn btn-primary" onclick="switchProfile(\x27" + ot + "\x27)">Switch to ' + ol + '</button></div>' +
    '<div class="card"><div class="card-header"><h3>' + I.refresh + ' Restart</h3></div><p class="text-muted mb-3">Restart gateway process</p><button class="btn btn-danger" onclick="restartGateway()">' + I.refresh + ' Restart Now</button><div id="restart-status" class="mt-3 text-muted"></div></div>' +
    '</div>';
}
